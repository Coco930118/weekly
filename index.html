<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="coconocanvas 投稿管理 — 関係の温度と距離を整える言葉たち">
  <title>coconocanvas | 投稿管理</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>

  <header class="site-header">
    <div>
      <p class="site-title">coconocanvas</p>
      <p class="site-subtitle">@coconocanvas — 投稿カレンダー</p>
    </div>
    <a href="./notes/index.html" style="font-size:0.75rem;color:#4e4e4e;text-decoration:none;border:1px solid #252525;padding:5px 12px;border-radius:6px;letter-spacing:0.04em;white-space:nowrap;" onmouseover="this.style.color='#8a8a8a';this.style.borderColor='#2e2e2e'" onmouseout="this.style.color='#4e4e4e';this.style.borderColor='#252525'">note 一覧 →</a>
  </header>

  <div class="filters">
    <div class="filter-row" id="platformFilterRow">
      <span class="filter-label">媒体</span>
      <button class="filter-btn active" data-platform="all">全て</button>
      <button class="filter-btn" data-platform="X">X</button>
      <button class="filter-btn" data-platform="Threads">Threads</button>
    </div>
    <div class="filter-row" id="weekFilterRow">
      <span class="filter-label">週</span>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">読み込み中…</div>

  <main class="posts-container" id="postsContainer"></main>

  <script src="./assets/app.js"></script>
</body>
</html>
